<div class="input-fields">
    <input type="text" [style.width]="inputWidth" [style.height]="inputHeight" [style.maxWidth]="inputMaxWidth" [placeholder]="placeholder" />
    <button>
        <img
        [src]="iconSrc"
        alt="icon"
        [style.display]="showIcon ? 'block' : 'none'"
    />
    </button>
    
</div>
