<section class="vote-results">
  @if (question()) {
    <h2>{{ question()!.order_index }}. {{ question()!.text }}</h2>
  }

  @for (o of options(); track o.id) {
    <div class="vote-results__visual">
      <p>{{ o.order_index }}</p>
      <div class="vote-bar">
        <div class="vote-bar__track"></div>
        <div class="vote-bar__fill" [style.width.%]="computeVotesToPercentages(o.id)"></div>
      </div>
      <span class="vote-restults__percentage">{{
        computeVotesToPercentages(o.id) | percentage: 0
      }}</span>
    </div>
  }
</section>
