<article class="create-survey__upper">
  <div class="create-survey__left">
    <div class="create-survey__field">
      <label class="create-survey__label">Survey name</label>

      <div class="create-survey__input-row">
        <input
          type="text"
          class="survey__input--standard-width survey__input--card"
          (blur)="showErrorMsg()"
          (input)="showErrorMsg()"
          [formControl]="titleControl()"
        />
        <app-delete-btn (delete)="clearSurveyName.emit()"></app-delete-btn>
      </div>
      <p class="error_msg" [class.error_msg--visible]="isVisible">This field cannot be empty!</p>
    </div>

    <div class="create-survey__row">
      <div class="create-survey__field">
        <label class="create-survey__label">Set end date (optional)</label>

        <div class="create-survey__input-row">
          <input
            [formControl]="datumControl()"
            [min]="today"
            type="date"
            onkeydown="return false;"
            class="survey__input--small-width survey__input--card"
          />
          <app-delete-btn (delete)="clearSurveyDatum.emit()"></app-delete-btn>
        </div>
      </div>

      <div class="create-survey__dropdown">
        <p class="error_msg" [class.error_msg--visible]="categoryErrorVisible">
          Ceategory is mandatory!
        </p>
        <app-dropdown
          label="Choose category"
          [options]="categories"
          [control]="categoryControl()"
          [(value)]="selectedCategory"
          (valueChange)="onCategorySelected($event)"
        ></app-dropdown>
      </div>
    </div>
  </div>

  <div class="create-survey__right">
    <div class="create-survey__field">
      <label class="create-survey__label">Describing text (optional)</label>
      <div class="create-survey__input-row">
        <textarea
          [formControl]="descriptionControl()"
          class="survey__textarea--card survey__input--standard-width"
        ></textarea>
        <app-delete-btn (delete)="clearSurveyDesctiption.emit()"></app-delete-btn>
      </div>
    </div>
  </div>
</article>
